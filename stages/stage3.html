<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOKOBAN 3D — Stage 3</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/hud.css" />
  </head>
  <body>
    <header class="game-header">
      <a href="../index.html" class="logo-link"
        ><div class="logo-title">SOKOBAN</div>
        <div class="logo-sub">3D Grid Puzzle</div></a
      >
      <div class="stage-badge">STAGE 03</div>
    </header>
    <div class="stats-bar">
      <div class="stat-box">
        <div class="stat-label">이동</div>
        <div class="stat-value" id="movesCount">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">시간</div>
        <div class="stat-value" id="timeCount">0:00</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">최고</div>
        <div class="stat-value" id="bestCount">--</div>
      </div>
    </div>
    <nav class="stage-nav">
      <a href="stage1.html" class="stage-link">S1</a>
      <a href="stage2.html" class="stage-link">S2</a>
      <span class="stage-link active">S3</span>
      <a href="stage4.html" class="stage-link">S4</a>
      <a href="stage5.html" class="stage-link">S5</a>
    </nav>
    <div id="canvasWrap">
      <canvas id="gameCanvas"></canvas>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot red"></div>
          플레이어
        </div>
        <div class="legend-item">
          <div class="legend-dot green"></div>
          블록
        </div>
        <div class="legend-item">
          <div class="legend-dot blue"></div>
          목표칸
        </div>
        <div class="legend-item">
          <div class="legend-dot white"></div>
          벽
        </div>
      </div>
      <div class="keys-hint">
        <kbd>↑↓←→</kbd> / <kbd>WASD</kbd> 이동<br /><kbd>R</kbd> 리셋 ·
        <kbd>V</kbd> 시점 초기화
      </div>

      <div class="hud">
        <div class="action-btns">
          <button class="btn btn-reset" onclick="game.reset()">리셋</button>
          <button
            class="btn btn-reset"
            style="
              color: var(--accent2);
              border-color: rgba(0, 212, 255, 0.3);
              background: rgba(0, 212, 255, 0.08);
            "
            onclick="game.orbit.resetView()"
          >
            시점
          </button>
        </div>
        <div class="dpad">
          <button class="dpad-btn" data-dir="up">↑</button>
          <button class="dpad-btn" data-dir="left">←</button>
          <button class="dpad-btn" data-dir="right">→</button>
          <button class="dpad-btn" data-dir="down">↓</button>
        </div>
      </div>
    </div>
    <div class="clear-overlay" id="clearOverlay">
      <div class="clear-card">
        <div class="clear-emoji">🎉</div>
        <div class="clear-title">STAGE CLEAR!</div>
        <div class="clear-moves">
          이동 <span id="clearMoves">0</span>회 ·
          <span id="clearTime">0:00</span>
        </div>
        <div class="clear-btns">
          <button
            class="btn btn-reset"
            onclick="game.reset()"
            style="padding: 14px 24px; font-size: 11px"
          >
            ↺ 다시하기
          </button>
          <a href="stage4.html" class="btn-next">다음 스테이지 →</a>
        </div>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="../js/constants.js"></script>
    <script src="../js/scene.js"></script>
    <script src="../js/orbit.js"></script>
    <script src="../js/input.js"></script>
    <script src="../js/game3d.js"></script>
    <script>
      const game = new SOKOBAN3D({
        stageId: 4,
        rows: 7,
        cols: 11,
        whitePositions: [
          ...[...Array(11)].map((_, i) => [1, i + 1]),
          [2, 1],
          [2, 5],
          [2, 6],
          [2, 11],
          [3, 1],
          [3, 2],
          [3, 5],
          [3, 11],
          [4, 1],
          [4, 9],
          [4, 10],
          [4, 11],
          [5, 1],
          [5, 8],
          [5, 9],
          [5, 10],
          [5, 11],
          [6, 1],
          [6, 5],
          [6, 8],
          [6, 9],
          [6, 10],
          [6, 11],
          ...[...Array(11)].map((_, i) => [7, i + 1]),
        ],
        bluePositions: [
          [2, 3],
          [2, 8],
          [2, 9],
          [2, 10],
          [3, 7],
        ],
        greenPositions: [
          [3, 4],
          [4, 5],
          [4, 6],
          [5, 3],
          [5, 6],
        ],
        redStart: [6, 7],
      });
    </script>
  </body>
</html>
