<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PushBlox — Stage 3 · Micro</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="page">
  <header class="game-header">
    <a href="../index.html" class="logo-link">
      <div class="logo-title">PUSHBLOX</div>
      <div class="logo-sub">Grid Puzzle</div>
    </a>
    <div class="stage-badge">STAGE 03 · MICRO</div>
  </header>

  <div class="stats-bar">
    <div class="stat-box"><div class="stat-label">이동 횟수</div><div class="stat-value" id="movesCount">0</div></div>
    <div class="stat-box"><div class="stat-label">경과 시간</div><div class="stat-value" id="timeCount">0:00</div></div>
    <div class="stat-box"><div class="stat-label">최고 기록</div><div class="stat-value" id="bestCount">--</div></div>
  </div>

  <div class="grid-wrapper">
    <div class="grid-game" id="gridGame"></div>
  </div>

  <div class="controls-section">
    <div class="dpad">
      <button class="dpad-btn" data-dir="up">↑</button>
      <button class="dpad-btn" data-dir="left">←</button>
      <button class="dpad-btn" data-dir="right">→</button>
      <button class="dpad-btn" data-dir="down">↓</button>
    </div>
    <div class="action-btns">
      <button class="btn btn-reset" onclick="game.reset()">↺ 리셋 (R)</button>
      <button class="btn btn-hint" onclick="toggleInstructions()">? 도움말</button>
    </div>
  </div>

  <details class="instructions" id="instrDetails">
    <summary>게임 방법</summary>
    <ol>
      <li>모든 <span class="g">초록 블록</span>을 <span class="b">파란 칸</span> 위에 올려놓으면 클리어!</li>
      <li><span class="r">빨간 공</span>으로 <span class="g">초록 블록</span>을 밀 수 있다.</li>
      <li><span class="g">초록 블록</span>은 <span class="w">흰 벽</span>이나 다른 블록으로는 이동 불가.</li>
    </ol>
  </details>

  <nav class="stage-nav">
    <a href="stage1.html" class="stage-link">Stage 1</a>
    <a href="stage2.html" class="stage-link">Stage 2</a>
    <span class="stage-link active">Stage 3</span>
    <a href="stage4.html" class="stage-link">Stage 4</a>
    <a href="stage5.html" class="stage-link">Stage 5</a>
  </nav>
</div>

<div class="clear-overlay" id="clearOverlay">
  <div class="clear-card">
    <div class="clear-emoji">🎉</div>
    <div class="clear-title">STAGE CLEAR!</div>
    <div class="clear-moves">이동 <span id="clearMoves">0</span>회 · <span id="clearTime">0:00</span></div>
    <div class="clear-btns">
      <button class="btn btn-reset btn-next" onclick="game.reset()" style="background:var(--surface);color:var(--red);border:1px solid var(--red);">↺ 다시하기</button>
      <a href="stage4.html" class="btn-next">다음 스테이지 →</a>
    </div>
  </div>
</div>

<script src="../js/game.js"></script>
<script>
const game = new PushBlox({
  stageId: 3,
  rows: 6, cols: 6,
  whitePositions: [
    [1,1],[1,2],[1,5],[1,6],
    [2,1],[2,2],[2,6],
    [4,2],[5,4],[5,6],
    [6,1],[6,2],[6,6],
  ],
  bluePositions: [[2,4],[3,1],[3,4],[3,5]],
  greenPositions: [[3,2],[3,3],[5,3],[5,5]],
  redStart: [6,4],
});

function toggleInstructions() {
  const d = document.getElementById('instrDetails');
  d.open = !d.open;
}
</script>
</body>
</html>
